<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excel AI — Admin Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f0f2f5; color: #111; padding: 20px; }
    h1 { font-size: 20px; margin-bottom: 20px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .card .label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: .5px; }
    .card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
    .chart-container { background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .chart-container h3 { font-size: 14px; color: #444; margin-bottom: 12px; }
    .section { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #eee; }
    th { color: #666; font-weight: 600; }
    .error { color: #e53935; }
    .refresh { margin-bottom: 12px; }
    .refresh button { padding: 6px 16px; border: 1px solid #ccc; background: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Excel AI — Admin</h1>
  <div class="refresh"><button onclick="loadAll()">Aggiorna</button></div>

  <div class="cards">
    <div class="card"><div class="label">Utenti totali</div><div class="value" id="totalUsers">—</div></div>
    <div class="card"><div class="label">Turn oggi</div><div class="value" id="turnsToday">—</div></div>
    <div class="card"><div class="label">Errori 24h</div><div class="value error" id="errors24h">—</div></div>
    <div class="card"><div class="label">Token out 24h</div><div class="value" id="tokensOut">—</div></div>
  </div>

  <div class="section">
    <div class="chart-container">
      <h3>Turn / giorno (ultimi 30gg)</h3>
      <canvas id="turnsChart"></canvas>
    </div>
    <div class="chart-container">
      <h3>Eventi per tipo (ultime 24h)</h3>
      <canvas id="eventsChart"></canvas>
    </div>
  </div>

  <div class="chart-container">
    <h3>Ultimi turn</h3>
    <table><thead><tr><th>Utente</th><th>Stato</th><th>Task</th><th>Azioni</th><th>Latenza</th><th>Data</th></tr></thead><tbody id="recentTurns"></tbody></table>
  </div>

<script>
const BASE = '/api/admin';

async function loadStats() {
  const r = await fetch(`${BASE}/stats`, { headers: { Authorization: `Bearer ${localStorage.getItem('token')}` } });
  const d = await r.json();
  document.getElementById('totalUsers').textContent = d.totalUsers;
  document.getElementById('turnsToday').textContent = d.turnsToday;
  document.getElementById('errors24h').textContent = d.errors24h;
  document.getElementById('tokensOut').textContent = (d.tokensOut24h || 0).toLocaleString();
}

async function loadCharts() {
  const r = await fetch(`${BASE}/events-daily`, { headers: { Authorization: `Bearer ${localStorage.getItem('token')}` } });
  const data = await r.json();

  // Turns chart
  const ctx1 = document.getElementById('turnsChart').getContext('2d');
  new Chart(ctx1, {
    type: 'bar',
    data: {
      labels: data.days || [],
      datasets: [{
        label: 'Turn completati', data: data.completed || [],
        backgroundColor: '#0b7f5c', borderRadius: 4,
      }, {
        label: 'Falliti', data: data.failed || [],
        backgroundColor: '#e53935', borderRadius: 4,
      }]
    },
    options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
  });

  const r2 = await fetch(`${BASE}/events-by-type`, { headers: { Authorization: `Bearer ${localStorage.getItem('token')}` } });
  const types = await r2.json();
  const ctx2 = document.getElementById('eventsChart').getContext('2d');
  new Chart(ctx2, {
    type: 'doughnut',
    data: {
      labels: types.map(t => t.type),
      datasets: [{ data: types.map(t => t.count), backgroundColor: ['#0b7f5c','#1f6f8b','#a65f00','#b42336','#78837c','#4d5b54'] }]
    },
    options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
  });
}

async function loadRecentTurns() {
  const r = await fetch(`${BASE}/recent-turns`, { headers: { Authorization: `Bearer ${localStorage.getItem('token')}` } });
  const turns = await r.json();
  document.getElementById('recentTurns').innerHTML = turns.map(t => `
    <tr>
      <td>${t.userEmail || t.userId?.slice(0,8)}</td>
      <td>${t.status}</td>
      <td>${t.taskCount || 0}</td>
      <td>${t.actionCount || 0}</td>
      <td>${t.totalLatencyMs ? (t.totalLatencyMs/1000).toFixed(1)+'s' : '—'}</td>
      <td>${t.createdAt?.slice(0,16) || '—'}</td>
    </tr>`).join('');
}

function loadAll() {
  document.querySelectorAll('canvas').forEach(c => { const ctx = c.getContext('2d'); Chart.getChart(c)?.destroy(); });
  loadStats();
  loadCharts();
  loadRecentTurns();
}

loadAll();
</script>
</body>
</html>
